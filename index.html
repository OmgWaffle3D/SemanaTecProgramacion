<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter - Mission Active</title>
    <link rel="stylesheet" href="styles/retro.css" />
    <style>
        .scoreboards-container {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            gap: 20px;
            z-index: 100;
        }

        .scoreboard {
            background: rgba(0, 20, 40, 0.8);
            border: 2px solid #00d2ff;
            border-radius: 8px;
            padding: 12px 20px;
            min-width: 200px;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        .scoreboard.hidden {
            display: none;
        }

        .scoreboard-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 0.8rem;
            color: #f4d166;
            margin-bottom: 8px;
            text-align: center;
        }

        .scoreboard-score {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.5rem;
            color: #3cf4ff;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
        }

        .scoreboard.player2 {
            border-color: #ffeb3b;
        }

        .scoreboard.player2 .scoreboard-title {
            color: #ff2df4;
        }

        .scoreboard.player2 .scoreboard-score {
            color: #ffeb3b;
            text-shadow: 0 0 10px rgba(255, 235, 59, 0.5);
        }
    </style>
</head>
<body class="retro-body">
    <!-- Scoreboards para modo 2 jugadores -->
    <div class="scoreboards-container">
        <div id="scoreboard1" class="scoreboard">
            <div class="scoreboard-title">PLAYER 1</div>
            <div class="scoreboard-score" id="score1">0</div>
        </div>
        <div id="scoreboard2" class="scoreboard hidden">
            <div class="scoreboard-title">PLAYER 2</div>
            <div class="scoreboard-score" id="score2">0</div>
        </div>
    </div>

    <div class="game-container">
        <h2 id="countdown" class="hidden">3</h2>
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="ytplayer"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="script/script.js"></script>
</body>
</html>
