<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter - Start Mission</title>
    <link rel="stylesheet" href="../styles/retro.css" />
    <style>
        .main-title {
            font-size: 5rem;
            line-height: 1.1;
            margin-bottom: 40px; /* Espacio bajo el título */
        }
        .player-option {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }
        .player-option.active {
            background: linear-gradient(90deg, rgba(255, 0, 255, 0.2), rgba(0, 210, 255, 0.2));
            border-color: var(--galaxy-blue);
        }
        #howToModal {
            position: fixed;
            inset: 0;
            background: rgba(10, 5, 20, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body class="retro-body">
    
    <header>
        <h1 class="main-title text-gradient gradient-galaxy">SPACE<br>SHOOTER</h1>
    </header>

    <main class="layout-grid container-full">
        <!-- Panel de Menú -->
        <section class="glass-card" style="flex: 1;">
            <h3 style="color: var(--galaxy-blue); margin-bottom: 25px;">MENU</h3>
            <button id="startBtn" class="btn-galaxy">START</button>
            <button id="howToBtn" class="btn-galaxy btn-secondary">HOW TO PLAY</button>
        </section>

        <!-- Panel de Selección -->
        <section class="glass-card" style="flex: 1.5;">
            <h3 style="color: var(--galaxy-pink); margin-bottom: 25px;">SELECT MODE</h3>
            <div class="mode-selector">
                <div id="opt1" class="player-option active">
                    <span class="retro-text">> 1 PLAYER</span>
                </div>
                <div id="opt2" class="player-option">
                    <span class="retro-text">  2 PLAYERS</span>
                </div>
            </div>
        </section>
    </main>

    <!-- Modal de Instrucciones -->
    <div id="howToModal" class="hidden">
        <div class="glass-card" style="max-width: 600px;">
            <h2 class="text-gradient gradient-galaxy" style="font-size: 1.5rem; margin-bottom: 30px;">FLIGHT MANUAL</h2>
            <div style="text-align: left; margin-bottom: 30px; line-height: 1.8;">
                <p style="color: var(--galaxy-pink); margin-bottom: 10px;">1 PLAYER: ARROWS</p>
                <p style="color: var(--galaxy-blue); margin-bottom: 20px;">PLAYER 2: WASD</p>
                <p style="color: #ccc; font-size: 0.7rem;">Mission: Eliminate all enemies. Don't lose your 3 hearts!</p>
            </div>
            <button id="closeModal" class="btn-galaxy">ENGAGE!</button>
        </div>
    </div>

    <div id="ytplayer"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="../script/ui.js"></script>
</body>
</html>
