<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter - Mission Results</title>
    <link rel="stylesheet" href="../styles/retro.css" />
    <style>
        .final-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 800px;
            margin-bottom: 60px;
        }

        svg {
            width: 100%;
            height: 120px;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }
        text {
            font-family: 'Press Start 2P', cursive;
            font-size: 60px;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .score-row {

            display: flex;
            gap: 30px;
            justify-content: center;
            width: 100%;
        }

        /* Caja individual de jugador con borde punteado */
        .player-result {
            flex: 1;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            font-size: 1.5rem;
            margin-bottom: 40px;
        }
        #finalScoreNum {
            color: var(--galaxy-blue);
            font-size: 2.5rem;
            text-shadow: 0 0 15px rgba(0, 210, 255, 0.5);

.high-scores-container {
    margin-top: 30px;
    margin-bottom: 30px;
    width: 100%;
    text-align: center;
}

.high-scores-container h3 {
    color: #fff;
    font-size: 1.2rem;
    margin-bottom: 15px;
    letter-spacing: 2px;
}

.clean-list {
    list-style: none;
    padding: 0;
    margin: 0 auto;
    width: 80%;
    max-width: 400px;
}

.score-item {
    display: flex;
    justify-content: space-between;
    font-size: 1rem;
    color: #a0c4ff; 
    padding: 10px 0;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.score-item:last-child {
    border-bottom: none;
}
        }
    </style>
</head>
<body class="retro-body">
    
    <header class="final-layout">
        <svg id="winTitle" class="hidden" viewBox="0 0 800 120">
            <defs>
                <linearGradient id="gradWin" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#fff; stop-opacity:1" />
                    <stop offset="50%" style="stop-color:#00ff00; stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#39ff14; stop-opacity:1" />
                </linearGradient>
            </defs>
            <text x="50%" y="50%" fill="url(#gradWin)">YOU WON!</text>
        </svg>

        <svg id="lossTitle" class="hidden" viewBox="0 0 800 120">
            <defs>
                <linearGradient id="gradLoss" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#fff; stop-opacity:1" />
                    <stop offset="50%" style="stop-color:#ff0000; stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#ff00ff; stop-opacity:1" />
                </linearGradient>
            </defs>
            <text x="50%" y="50%" fill="url(#gradLoss)">GAME OVER</text>
        </svg>
    </header>

    <main class="glass-card container-full" style="max-width: 700px;">
        <div class="score-row" id="singlePlayerScore">
            FINAL SCORE: <span id="finalScoreNum">0</span>
        </div>

        <!-- Resultados en modo 2 jugadores -->
        <div id="multiplayerResults" class="hidden" style="width: 100%; margin-bottom: 30px;">
            <h3 style="color: #fff; text-align: center; margin-bottom: 20px;">FINAL RESULTS</h3>
            <div class="score-row" style="flex-direction: column; gap: 15px;">
                <div style="display: flex; justify-content: space-between; padding: 15px; background: rgba(60, 244, 255, 0.1); border-radius: 8px; border: 2px solid #3cf4ff;">
                    <span>PLAYER 1</span>
                    <span id="multiP1Score" style="color: #3cf4ff; font-weight: bold;">0</span>
                </div>
                <div style="display: flex; justify-content: space-between; padding: 15px; background: rgba(255, 235, 59, 0.1); border-radius: 8px; border: 2px solid #ffeb3b;">
                    <span>PLAYER 2</span>
                    <span id="multiP2Score" style="color: #ffeb3b; font-weight: bold;">0</span>
                </div>
                <div id="winnerMessage" style="text-align: center; color: #39ff14; font-size: 1.3rem; margin-top: 10px; font-weight: bold;">
                </div>
            </div>
        </div>

        <div class="high-scores-container">
            <h3>TOP PILOTS</h3>
            <ul id="highScoresList" class="clean-list"></ul>
        </div>
        <button id="restartBtn" class="btn-galaxy">MAIN PAGE</button>
    </main>

    <div id="ytplayer"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="../script/ui.js"></script>
</body>
</html>
