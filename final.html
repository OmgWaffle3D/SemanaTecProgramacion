<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Over</title>
    <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
    <main class="game-container">
        <section class="overlay">
            <h1>¡GAME OVER!</h1>

            <section>
                <h2>Resultados Finales</h2>
                <p>
                    <strong>Puntuación final:</strong> <span id="finalScore">0</span> puntos
                </p>
            </section>

            <button id="restartBtn" class="btn-primary">VOLVER A JUGAR</button>
        </section>
    </main>

    <script>
        // Obtener puntuación de localStorage o parámetro URL
        function mostrarResultados() {
            const params = new URLSearchParams(window.location.search);
            const score = params.get('score') || localStorage.getItem('finalScore') || 0;
            document.getElementById('finalScore').textContent = score;
        }

        document.getElementById('restartBtn').addEventListener('click', () => {
            window.location.href = 'inicio.html';
        });

        mostrarResultados();
    </script>
</body>
</html>
